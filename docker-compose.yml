services:
  hyper-claude-code:
    build: .
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8082
    volumes:
      - hcc-data:/root/.fcc
      - ./agent_workspace:/app/agent_workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  hcc-data:
